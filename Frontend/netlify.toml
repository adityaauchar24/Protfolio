[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"
  CI = "false"

# Deploy context configurations
[context.production]
  command = "npm run build"
  environment = { VITE_API_URL = "https://protfolio-backend-8p47.onrender.com" }

[context.deploy-preview]
  environment = { VITE_API_URL = "https://protfolio-backend-8p47.onrender.com" }

[context.branch-deploy]
  environment = { VITE_API_URL = "https://protfolio-backend-8p47.onrender.com" }

# Always use HTTPS
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"